[project]
name = "tetherto-qvac-lib-infer-onnx-vad-benchmark-client"
version = "0.0.1"
description = "Benchmark client for Whisper transcription addons"
authors = [
    {name = "Tether"}
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = "^3.12.0"
dependencies = [
    "pyyaml (>=6.0.2,<7.0.0)",
    "pydantic (>=2.11.4,<3.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "datasets (>=3.6.0,<4.0.0)",
    "huggingface-hub[hf-xet] (>=0.32.0,<0.33.0)",
    "soundfile (>=0.13.1,<0.14.0)",
    "librosa (>=0.11.0,<0.12.0)",
    "evaluate (>=0.4.3,<0.5.0)",
    "jiwer (>=3.1.0,<4.0.0)",
    "textgrid (>=1.6.1,<2.0.0)"
]

[tool.poetry]
packages = [{include = "src"}]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
