server:
  addon_url: "http://localhost:8080/synthesize"
  addon_version: "^0.1.0" # Version of @qvac/tts-onnx to benchmark (update package.json and restart server)
  python_url: "http://localhost:8081/synthesize"
  timeout: 60
  batch_size: 10

comparison:
  enabled: true # Run against both servers
  run_addon: true
  run_python: true
  round_trip_test: false # Use Whisper to transcribe audio back to text
  whisper_model: "medium" # Whisper model size: tiny, base, small, medium, large
  seed: 42 # Random seed for reproducibility
  num_runs: 1 # Number of times to synthesize each text (for determinism testing)

dataset:
  name: "harvard" # Options: harvard, ag_news, librispeech
  split: "test"
  max_samples: 0 # Limit for faster testing, 0 = unlimited (harvard has 72 sentences total)

model:
  # Paths relative to benchmarks/ directory
  modelPath: "shared-data/models/model.onnx"
  configPath: "shared-data/models/config.json"
  eSpeakDataPath: "shared-data/espeak-ng-data"
  language: "en-us" # Language code: en-us (English), es (Spanish), de (German), it (Italian)
  sampleRate: 22050
  useGPU: false # Enable GPU acceleration for inference

hyperdrive:
  # HyperDrive keys for downloading data files
  espeak_key: "hd://c00ea8bc3d250968943ecab83e39b22828c2ad7995b159d8aedcb0f3fef81894"
  # model_key is automatically determined based on model.language (see benchmarks/server/tts-setup.js)
