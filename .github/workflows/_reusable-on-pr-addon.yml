name: Reusable On-PR Addon

on:
  workflow_call:
    inputs:
      package_slug:
        required: true
        type: string
      workdir:
        required: true
        type: string
      repository:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ""
      run_verify:
        required: false
        type: boolean
        default: true
      run_cpp_tests:
        required: false
        type: boolean
        default: true
      run_integration_tests:
        required: false
        type: boolean
        default: true
      run_mobile_tests:
        required: false
        type: boolean
        default: true
      publish_target:
        required: false
        type: string
        default: gpr
      tag:
        required: false
        type: string
        default: dev
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      MODEL_S3_BUCKET:
        required: false
      NPM_TOKEN:
        required: true
      PAT_TOKEN:
        required: true
      QASE_API_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  sanity-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Run sanity checks
        uses: tetherto/qvac-devops/.github/actions/sanity-checks@v1.1.7
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ inputs.run_verify }}
          workdir: ${{ inputs.workdir }}

  cpp-lint:
    if: needs.authorize.outputs.allowed == 'true' && inputs.run_verify
    uses: tetherto/qvac-devops/.github/workflows/cpp-lint.yaml@v1.1.7
    needs: authorize
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      sha: ${{ github.event.pull_request.base.sha || github.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      workdir: ${{ inputs.workdir }}

  prebuild:
    needs: [authorize, sanity-checks]
    if: needs.authorize.outputs.allowed == 'true' && inputs.run_verify
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/_reusable-prebuilds-addon.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      package_slug: ${{ inputs.package_slug }}
      workdir: ${{ inputs.workdir }}
      repository: ${{ inputs.repository || github.event.pull_request.head.repo.full_name }}
      ref: ${{ inputs.ref || github.event.pull_request.head.ref }}
      publish_target: ${{ inputs.publish_target }}
      tag: ${{ inputs.tag }}

  merge-guard:
    needs: [authorize, sanity-checks, cpp-lint, prebuild]
    if: always()
    uses: tetherto/qvac-devops/.github/workflows/public-pr.yml@v1.1.7
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
      cpplint-status: ${{ needs.cpp-lint.result == 'success' || needs.cpp-lint.result == 'skipped' }}
      cpp-tests-status: true
      integration-status: true
      mobile-tests-status: true
