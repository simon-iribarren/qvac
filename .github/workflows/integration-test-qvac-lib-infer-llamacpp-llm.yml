name: Run Integration Tests (Qvac-lib-infer-llamacpp-llm)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      model:
        description: "Model (currently unused by this workflow)"
        type: string
        required: false
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/llm-llamacpp@1.0.0). If empty, download from artifacts."
        type: string
        required: false
        default: ""
      workdir:
        description: "Package working directory in monorepo (e.g., packages/qvac-lib-infer-llamacpp-llm)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/llm-llamacpp@1.0.0)"
        type: string
        required: true
      workdir:
        description: "Package working directory in monorepo (e.g., packages/qvac-lib-infer-llamacpp-llm)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"

jobs:
  run-integration-tests:
    timeout-minutes: 360
    continue-on-error: true
    runs-on: ${{ matrix.runner }}
    name: test-${{ matrix.platform }}-${{ matrix.arch }}

    permissions:
      contents: read
      packages: read

    env:
      # Auth / cloud
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Workdir "port": everything runs under this package dir
      WORKDIR: ${{ inputs.workdir }}
      PKG_DIR: ${{ github.workspace }}/${{ inputs.workdir }}
      PREBUILDS_DIR: ${{ github.workspace }}/${{ inputs.workdir }}/prebuilds

    strategy:
      fail-fast: false
      matrix:
        include:
          # Run Linux x64 tests on both Ubuntu 22.04 and 24.04 to ensure compatibility
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: ubuntu-22.04
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: ai-run-linux-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
            runner: macos-15-xlarge
          - os: macos-15-large
            platform: darwin
            arch: x64
            runner: macos-15-large
          - os: windows-2022
            platform: win32
            arch: x64
            runner: ai-run-windows-gpu

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: powershell
        run: |
          git config --system core.longpaths true
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          repository: ${{ inputs.repository || github.repository }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Validate workdir exists
        shell: bash
        run: |
          set -euo pipefail
          echo "WORKDIR=${WORKDIR}"
          echo "PKG_DIR=${PKG_DIR}"
          test -d "${PKG_DIR}" || {
            echo "❌ workdir not found: ${PKG_DIR}"
            echo "Repo root listing:"
            ls -la
            exit 1
          }

      - name: Configure scoped registry for @tetherto and @qvac packages (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "=== Debug: Github event name is '${{ github.event_name }}' ==="
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
          fi

      - name: Configure scoped registry for @tetherto and @qvac packages (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: powershell
        run: |
          echo "=== Debug: Github event name is '${{ github.event_name }}' ==="
          echo "=== Configuring scoped registry for @tetherto and @qvac packages ==="
          echo "Writing .npmrc for dual registry install…"
          @"
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=$env:NPM_TOKEN
          //npm.pkg.github.com/:_authToken=$env:GPR_TOKEN
          "@ | Out-File -FilePath .npmrc -Encoding utf8

          echo "=== Verifying .npmrc creation ==="
          Get-Content .npmrc
          echo "=================================="

          # Configure git
          if ($env:GIT_PAT) {
            git config --global url."https://$env:GIT_PAT:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://$env:GIT_PAT:@github.com/".insteadOf "git@github.com:"
          } else {
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          }

      - name: Install NPM dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          npm install
          npm install -g bare bare-make bare-runtime bare-https brittle

      - name: Ensure prebuilds dir exists
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          mkdir -p "${PREBUILDS_DIR}"
          ls -la "${PREBUILDS_DIR}"

      - name: Download prebuilds (from artifacts)
        if: ${{ !inputs.prebuild_package || inputs.prebuild_package == '' }}
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.PREBUILDS_DIR }}
          merge-multiple: true

      - name: Download prebuilds from package (Linux/macOS)
        if: ${{ inputs.prebuild_package && inputs.prebuild_package != '' && matrix.platform != 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="${{ inputs.prebuild_package }}"
          echo "Downloading $PACKAGE from npm..."

          # Download package from npm with error handling
          if ! npm pack "$PACKAGE"; then
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          fi

          # Extract the tarball
          tar -xzf *.tgz

          # Validate prebuilds directory exists
          if [ ! -d "package/prebuilds" ]; then
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          fi

          # Move prebuilds to expected location (under workdir)
          rm -rf "${PREBUILDS_DIR}" 2>/dev/null || true
          mv package/prebuilds "${PREBUILDS_DIR}"

          # Cleanup
          rm -rf package *.tgz

          echo "Prebuilds downloaded from npm successfully:"
          ls -la "${PREBUILDS_DIR}/"

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && inputs.prebuild_package != '' && matrix.platform == 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        shell: powershell
        run: |
          $PACKAGE = "${{ inputs.prebuild_package }}"
          echo "Downloading $PACKAGE from npm..."

          npm pack $PACKAGE
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          }

          $TARBALL = Get-ChildItem -Filter "*.tgz" | Select-Object -First 1 -ExpandProperty Name
          if (-not $TARBALL) {
            echo "ERROR: Could not find downloaded tarball"
            exit 1
          }

          echo "Extracting $TARBALL..."
          tar -xzf $TARBALL

          if (-not (Test-Path "package/prebuilds")) {
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          }

          # Replace prebuilds dir under workdir
          if (Test-Path "$env:PREBUILDS_DIR") {
            Remove-Item -Recurse -Force "$env:PREBUILDS_DIR"
          }
          New-Item -ItemType Directory -Force -Path "$env:PREBUILDS_DIR" | Out-Null
          Move-Item package/prebuilds "$env:PREBUILDS_DIR"

          Remove-Item -Recurse -Force package
          Remove-Item $TARBALL

          echo "Prebuilds downloaded from npm successfully:"
          Get-ChildItem "$env:PREBUILDS_DIR"

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - name: Linux - install glibcxx
        if: ${{ startsWith(matrix.os, 'ubuntu-22') }}
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install -y g++-13

      - name: Windows - Install Vulkan
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        shell: powershell
        timeout-minutes: 40
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe -OutFile vulkan-sdk.exe -PassThru -UseBasicParsing
          ./vulkan-sdk.exe --root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - name: Run integration test (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
        run: |
          set -euo pipefail
          npm run test:integration 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.PKG_DIR }}
        shell: powershell
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
        run: |
          npm run test:integration:generate
          bare test/integration/all.js --exit | Tee-Object test-output.log
