name: Reusable On-PR Close Addon

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      pr-number:
        required: false
        type: string
      pattern:
        required: false
        type: string
      packages:
        required: false
        type: string
      dry-run:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  print-context:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: |
          echo "Inputs Context: $INPUTS_CONTEXT"
        env:
          INPUTS_CONTEXT: ${{ toJSON(inputs) }}
      - run: |
          echo "GitHub Context: $GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}

  delete-npm-versions-trigger:
    permissions:
      packages: write
    uses: tetherto/qvac-devops/.github/workflows/public-delete-npm-versions.yml@v1.1.7
    with:
      version: ${{ inputs.version }}
      pr-number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr-number }}
      pattern: ${{ inputs.pattern }}
      packages: ${{ inputs.packages }}
      dry-run: ${{ github.event_name == 'pull_request' && true || inputs.dry-run }}
    secrets: inherit
