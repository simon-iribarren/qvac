name: Prebuilds (LLM)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with ('latest' by default)"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - dev
      publish_target:
        description: "Where to publish: 'npm', 'gpr' or 'both'"
        required: false
        default: ""
        type: string
      vk-profiling:
        description: "Enable Vulkan profiling"
        type: boolean
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      tag:
        description: "Tag to publish"
        type: string
        required: false
        default: "dev"
      publish_target:
        description: "Where to publish: 'npm', 'gpr' or 'both'"
        type: string
        required: false
        default: ""
      vk-profiling:
        description: "Enable Vulkan profiling"
        type: boolean
        required: false
        default: false
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-llamacpp-llm"
    outputs:
      published_version:
        description: "The version that was published"
        value: ${{ jobs.prebuild.outputs.published_version }}

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/_reusable-prebuilds-addon.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      package_slug: qvac-lib-infer-llamacpp-llm
      workdir: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/qvac-lib-infer-llamacpp-llm' }}
      artifact_prefix: llama-cpp
      repo_name: llamacpp-llm
      publish_target: ${{ inputs.publish_target || github.event.inputs.publish_target || '' }}
      tag: ${{ inputs.tag || github.event.inputs.tag || 'dev' }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref || github.ref }}
      npm_package_name: "@qvac/llm-llamacpp"
      gpr_package_name: "@tetherto/llm-llamacpp"
      extra_generate_flags: ${{ inputs.vk-profiling && '-D VK_PROFILING=ON' || '' }}
