name: Docs Website PR Checks

on:
  pull_request:
    paths:
      - 'docs/website/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-website-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: docs/website

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create placeholder for generated API docs
        run: |
          mkdir -p "content/docs/(latest)/sdk/api"
          printf '%s\n' '---' 'title: "@qvac/sdk"' 'titleStyle: code' 'description: API Reference' '---' '' 'Placeholder for generated API docs.' > "content/docs/(latest)/sdk/api/index.mdx"

      - name: Build and validate
        run: bun run build
