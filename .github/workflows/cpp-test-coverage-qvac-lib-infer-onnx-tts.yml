name: C++ Tests & Coverage (Qvac-lib-infer-onnx-tts)

on:
  pull_request:
    branches: [main, release-*]
    types: [opened, closed]
    paths:
      - "packages/qvac-lib-infer-onnx-tts/**"
  push:
    branches: [main, release-*]
    paths:
      - "packages/qvac-lib-infer-onnx-tts/**"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      workdir:
        description: "Package working directory in monorepo (e.g., packages/qvac-lib-infer-onnx-tts)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-tts"
  workflow_dispatch:
    inputs:
      workdir:
        description: "Package working directory in monorepo (e.g., packages/qvac-lib-infer-onnx-tts)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx-tts"

env:
  BUILD_TYPE: Debug
  ENABLE_COVERAGE: ON

jobs:
  cpp-tests:
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (github.event_name == 'pull_request' && (github.event.action != 'closed' || github.event.pull_request.merged == true)) }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}-cpp-tests
    permissions:
      contents: read
      packages: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            coverage: true
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/cache,readwrite"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/qvac-lib-infer-onnx-tts' }}

    steps:
      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Maximize build space
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          repository: ${{ inputs.repository || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt update
          sudo apt install -y g++-13
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - name: Verify llvm-profdata and llvm-cov installation
        if: matrix.platform == 'linux'
        run: |
          ls -l /usr/bin/llvm-profdata* || echo "llvm-profdata not found"
          ls -l /usr/bin/llvm-cov* || echo "llvm-cov not found"
          which llvm-profdata || echo "llvm-profdata not in PATH"
          which llvm-profdata-19 || echo "llvm-profdata-19 not in PATH"
          dpkg -l | grep llvm || echo "No LLVM packages found"

      - name: Configure scoped registry for @tetherto and @qvac packages
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          target_dir="$GITHUB_WORKSPACE/${WORKDIR}"
          mkdir -p "$target_dir"

          cat > "$target_dir/.npmrc" <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "git@github.com:"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "git@github.com:"
          fi

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install
          npm install -g bare bare-make

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Generate and build unit tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:build

      - name: Download test models
        working-directory: ${{ env.WORKDIR }}
        run: |
          mkdir -p models/tts
          aws s3 cp s3://tether-ai-dev/qvac_models_compiled/tts/2025-09-04/ models/tts --recursive

      - name: Run C++ Unit Tests
        id: cpp-tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run test:cpp:run
        continue-on-error: true

      - name: Generate Coverage Report
        if: matrix.coverage
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:report

          # 4. Extract percentage
          COVERAGE=$(grep 'TOTAL' coverage-summary.txt | awk '{print $10}')
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "Line Coverage: ${COVERAGE}" > coverage-badge.txt

      - name: Archive Coverage Results
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/addon/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/addon/test/unit/cpp-test-results.xml
          retention-days: 30

      - name: Comment Coverage on PR
        if: matrix.coverage && github.event_name == 'pull_request' && matrix.platform == 'linux'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.WORKDIR }}/build/addon/test/unit/coverage-summary.txt';
            if (fs.existsSync(path)) {
              const coverage = fs.readFileSync(path, 'utf8');
              const body = `## 🧪 C++ Test Coverage Report (Comprehensive)

              **Platform:** ${{ matrix.platform }}-${{ matrix.arch }}
              **Coverage:** ${process.env.COVERAGE_PERCENTAGE}
              **Test Structure:** Professional addon/tests/ with clean foundation

              <details>
              <summary>📊 Detailed Coverage</summary>

              \`\`\`
              ${coverage}
              \`\`\`

              </details>

              **Test Components:**
              - TranslationModel`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Coverage Summary
        if: matrix.coverage
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "## 🎯 Coverage Summary (Comprehensive)" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ matrix.platform }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.COVERAGE_PERCENTAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Foundation:** Professional clean test structure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/addon/test/unit/coverage-summary.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat build/addon/test/unit/coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

  coverage-report:
    needs: cpp-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports

      - name: Combine Coverage Reports
        run: |
          echo "## 📊 C++ Comprehensive Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built on:** Professional test foundation" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** 100+ comprehensive test cases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in coverage-reports/*/coverage-summary.txt; do
            if [ -f "$report" ]; then
              platform=$(basename $(dirname "$report"))
              echo "### $platform" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat "$report" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
