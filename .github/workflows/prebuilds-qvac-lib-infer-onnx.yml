# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-onnx.yml
name: "Prebuilds (ONNX)"

on:
  workflow_dispatch:
    inputs:
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx"

  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        # monorepo default
        default: "tetherto/qvac"
      tar-run-id:
        type: string
        required: false
        default: "on-onnx"
      workdir:
        description: "Working directory (optional)"
        required: false
        type: string
        default: "packages/qvac-lib-infer-onnx"

env:
  WORKDIR: ${{ inputs.workdir }}

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: arm64
            flags: -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: macos-15
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: macos-15
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - name: Echo workflow inputs
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref || github.ref }}
          INPUT_REPO: ${{ inputs.repository || github.repository }}
          INPUT_WORKDIR: ${{ env.WORKDIR }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_TAGS: ${{ matrix.tags }}
        run: |
          echo "Workflow inputs:"
          echo "Ref: $INPUT_REF"
          echo "Repository: $INPUT_REPO"
          echo "Workdir: $INPUT_WORKDIR"
          echo "Matrix platform: $MATRIX_PLATFORM"
          echo "Matrix arch: $MATRIX_ARCH"
          echo "Matrix tags: $MATRIX_TAGS"

      - name: Setup build host
        uses: tetherto/qvac/.github/actions/setup-build-host@1d9b2165867d03c6edd675e402ee101a5d48a6d8
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup AWS + Windows CLI
        uses: tetherto/qvac/.github/actions/setup-aws-prebuild@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Setup vcpkg
        uses: tetherto/qvac/.github/actions/setup-vcpkg@1d9b2165867d03c6edd675e402ee101a5d48a6d8
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Setup Bare tooling
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@0bbdca93da303a0b1634ba14a89cec085621078d

      - name: Setup Apple Clang
        uses: tetherto/qvac/.github/actions/setup-apple-clang@1d9b2165867d03c6edd675e402ee101a5d48a6d8

      - if: ${{ startsWith(matrix.os, 'macos') && matrix.platform == 'ios' }}
        name: Verify UIKit Frameworks
        run: |
          SDK_OS=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_SIM=$(xcrun --sdk iphonesimulator --show-sdk-path)

          echo "Device SDK: $SDK_OS"
          ls $SDK_OS/System/Library/Frameworks | grep UIKit || echo "UIKit.framework missing in device SDK!"

          echo "Simulator SDK: $SDK_SIM"
          ls $SDK_SIM/System/Library/Frameworks | grep UIKit || echo "UIKit.framework missing in simulator SDK!"

      - name: Install npm dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - name: Generate
        working-directory: ${{ env.WORKDIR }}
        run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }}

      - name: Run bare-make build
        working-directory: ${{ env.WORKDIR }}
        run: bare-make build

      - name: Run bare-make install
        working-directory: ${{ env.WORKDIR }}
        run: bare-make install

      - name: Strip debug symbols
        uses: tetherto/qvac/.github/actions/strip-prebuilds@1d9b2165867d03c6edd675e402ee101a5d48a6d8
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ env.WORKDIR }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: onnx-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.WORKDIR }}/prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds
